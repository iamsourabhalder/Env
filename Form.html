<form id="contactForm">
    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>
    <textarea id="message" placeholder="Message" required></textarea>
    <button type="submit">Submit</button>
</form>
<script>const GITHUB_TOKEN = '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';
const REPO_OWNER = 'iamsourabhalder;
const REPO_NAME = 'Env';
const FILE_PATH = 'data.json';

document.getElementById('contactForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const entry = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value,
        date: new Date().toISOString()
    };

    try {
        // 1. Get the current file content and its SHA (required for updates)
        const getFile = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            headers: { "Authorization": `token ${GITHUB_TOKEN}` }
        });
        const fileData = await getFile.json();
        const sha = fileData.sha;
        
        // 2. Decode existing content and add new entry
        const currentContent = JSON.parse(atob(fileData.content));
        currentContent.push(entry);

        // 3. Push updated content back to GitHub
        const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            method: "PUT",
            headers: {
                "Authorization": `token ${GITHUB_TOKEN}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: "New contact form submission",
                content: btoa(JSON.stringify(currentContent, null, 2)), // Encode to Base64
                sha: sha
            })
        });

        if (response.ok) alert("Data saved to GitHub!");
    } catch (error) {
        console.error("Error:", error);
    }
});
</script>
